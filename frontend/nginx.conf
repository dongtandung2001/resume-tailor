server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the backend service
    location /api {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Allow enough time for PDF → OCR → LLM pipeline
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;

        # Increase buffer sizes for large PDF uploads
        client_max_body_size 25M;
        proxy_request_buffering off;
        add_header Access-Control-Expose-Headers "X-Page-Count";
    }
}
