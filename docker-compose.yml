services:
  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      PORT: "3001"
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    driver: bridge
